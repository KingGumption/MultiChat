<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Example Widget</title>
  <style>
    body{margin:0;background:transparent;font-family:Inter,Arial,sans-serif}
    .msg{display:flex;gap:10px;padding:10px;border-radius:10px;background:rgba(0,0,0,0.28);margin:8px;color:#fff}
    @keyframes popIn{from{opacity:0;transform:translateY(12px) scale(.98}}to{opacity:1;transform:none}}
    .anim-pop{animation:popIn .24s ease-out}
  </style>
</head>
<body>
  <div class="msg anim-pop"><strong>MSG</strong><div style="margin-left:8px">Hello from example widget</div></div>
</body>
</html>
