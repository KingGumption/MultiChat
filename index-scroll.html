<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi Chat Overlay Settings</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #101018;
      color: #ffffff;
      box-sizing: border-box;
    }

    .config-page {
      display: grid;
      grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
      height: 100vh;
      overflow: hidden;
    }

    .config-panel {
      height: 100vh;
      overflow: auto;
      box-sizing: border-box;
      padding: 18px;
      border-right: 1px solid rgba(255,255,255,0.12);
      background: rgba(8,8,16,0.96);
    }

    .config-title {
      margin: 0 0 16px;
      font: 900 20px/1.1 var(--font-family);
    }

    .config-section {
      padding: 14px 0;
      border-top: 1px solid rgba(255,255,255,0.10);
    }

    .config-section h2 {
      margin: 0 0 10px;
      color: rgba(255,255,255,0.72);
      font: 900 12px/1 var(--font-family);
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .config-description {
      margin: -4px 0 10px;
      color: rgba(255,255,255,0.52);
      font: 700 12px/1.35 var(--font-family);
    }

    .config-control {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin: 9px 0;
      font: 700 13px/1.2 var(--font-family);
    }

    .config-control input,
    .config-control select {
      min-width: 82px;
      max-width: 150px;
      box-sizing: border-box;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      padding: 7px 8px;
      font: 700 13px/1 var(--font-family);
    }

    .range-wrap {
      display: grid;
      grid-template-columns: minmax(80px, 1fr) 68px auto;
      gap: 6px;
      align-items: center;
      min-width: min(240px, 100%);
    }

    .config-control .range-number {
      min-width: 0;
      max-width: 68px;
    }

    .config-control select option {
      color: #111111;
    }

    .preset-control {
      display: grid;
      gap: 7px;
      min-width: 0;
      justify-items: end;
    }

    .preset-buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      width: min(230px, 100%);
    }

    .preset-buttons button {
      padding: 6px 8px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 7px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.78);
      font: 800 11px/1 var(--font-family);
      cursor: pointer;
      min-width: 0;
    }

    .preset-buttons button.active {
      background: rgba(145,70,255,0.70);
      color: #ffffff;
    }

    .preset-description {
      max-width: 230px;
      color: rgba(255,255,255,0.58);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.25;
      text-align: right;
    }

    .config-control .preset-custom-input {
      width: 100%;
      max-width: 230px;
      justify-self: end;
    }

    .config-control-preset {
      grid-template-columns: 92px minmax(0, 1fr);
      align-items: start;
      gap: 12px;
      margin: 14px 0;
    }

    .preset-custom-input[hidden] {
      display: none;
    }

    .font-picker {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 32px;
      width: 190px;
      max-width: min(190px, 50vw);
    }

    .config-control .font-picker input {
      width: 100%;
      max-width: none;
      min-width: 0;
      border-radius: 8px 0 0 8px;
    }

    .font-picker-button {
      border: 1px solid rgba(255,255,255,0.18);
      border-left: 0;
      border-radius: 0 8px 8px 0;
      background: rgba(255,255,255,0.10);
      color: #ffffff;
      cursor: pointer;
      font: 900 13px/1 var(--font-family);
    }

    .font-picker-list {
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      z-index: 30;
      width: min(280px, 78vw);
      max-height: 260px;
      overflow: auto;
      padding: 6px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: #15151f;
      box-shadow: 0 18px 42px rgba(0,0,0,0.48);
    }

    .font-picker-list[hidden] {
      display: none;
    }

    .font-picker-option {
      display: block;
      width: 100%;
      margin: 0;
      padding: 9px 10px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #ffffff;
      text-align: left;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.1;
    }

    .font-picker-option:hover,
    .font-picker-option:focus {
      background: rgba(255,255,255,0.12);
      outline: none;
    }

    .font-picker-empty {
      padding: 8px 10px;
      color: rgba(255,255,255,0.58);
      font: 700 12px/1.3 var(--font-family);
    }

    .config-control input[type="checkbox"] {
      width: 18px;
      height: 18px;
      min-width: 18px;
      accent-color: #9146ff;
    }

    .config-control input[type="range"] {
      width: 138px;
      padding: 0;
      accent-color: #9146ff;
    }

    .config-control input[type="color"] {
      width: 44px;
      min-width: 44px;
      height: 32px;
      padding: 2px;
      cursor: pointer;
    }

    .gradient-editor {
      padding: 10px 12px 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .gradient-bar {
      position: relative;
      height: 34px;
      margin: 8px 4px 18px;
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 8px;
      cursor: crosshair;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.26),
        0 8px 18px rgba(0,0,0,0.24);
    }

    .gradient-stop {
      position: absolute;
      top: 50%;
      width: 14px;
      height: 42px;
      border: 2px solid rgba(255,255,255,0.92);
      border-radius: 5px;
      background: var(--stop-color, #9146ff);
      box-shadow:
        0 0 0 2px rgba(10,10,18,0.88),
        0 4px 10px rgba(0,0,0,0.34);
      transform: translate(-50%, -50%);
      cursor: grab;
    }

    .gradient-stop:active {
      cursor: grabbing;
    }

    .gradient-stop.active {
      box-shadow:
        0 0 0 2px #ffffff,
        0 0 0 5px rgba(145,70,255,0.44),
        0 4px 10px rgba(0,0,0,0.34);
    }

    .gradient-stop-list {
      display: grid;
      gap: 8px;
      margin: 8px 0 10px;
    }

    .gradient-mode-row {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      margin: 4px 0 10px;
    }

    .gradient-mode {
      display: inline-flex;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
    }

    .gradient-mode button {
      min-width: 66px;
      border: 0;
      border-right: 1px solid rgba(255,255,255,0.14);
      background: transparent;
      color: rgba(255,255,255,0.76);
      padding: 8px 12px;
      cursor: pointer;
      font: 800 13px/1 var(--font-family);
    }

    .gradient-mode button:last-child {
      border-right: 0;
    }

    .gradient-mode button.active {
      background: rgba(255,255,255,0.20);
      color: #ffffff;
    }

    .gradient-picker-grid {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
      margin: 8px 0 10px;
    }

    .gradient-picker-label {
      display: block;
      margin: 0 0 7px;
      color: rgba(255,255,255,0.58);
      font: 900 11px/1 var(--font-family);
      text-transform: uppercase;
    }

    .gradient-color-plane {
      position: relative;
      height: 150px;
      border-radius: 6px;
      cursor: crosshair;
      overflow: hidden;
      background:
        linear-gradient(0deg, #000000 0%, rgba(0,0,0,0) 100%),
        linear-gradient(90deg, #ffffff 0%, var(--picker-hue-color, #9146ff) 100%);
    }

    .gradient-picker-cursor {
      position: absolute;
      width: 14px;
      height: 14px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(5,5,10,0.78);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .gradient-hue {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      margin: 9px 0 0;
      padding: 0;
      height: 12px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        #ff0000 0%,
        #ffff00 16.67%,
        #00ff00 33.33%,
        #00ffff 50%,
        #0000ff 66.67%,
        #ff00ff 83.33%,
        #ff0000 100%
      );
      cursor: pointer;
    }

    .gradient-hue::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 10px;
      height: 22px;
      border: 2px solid #ffffff;
      border-radius: 5px;
      background: #0e1020;
      box-shadow: 0 0 0 2px rgba(5,5,10,0.78);
    }

    .gradient-angle {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .gradient-angle-dial {
      position: relative;
      width: 36px;
      height: 36px;
      border: 2px solid rgba(255,255,255,0.92);
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      cursor: grab;
      box-sizing: border-box;
    }

    .gradient-angle-dial.disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .gradient-angle-dial::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8bb8ff;
      box-shadow: 0 0 0 2px rgba(5,5,10,0.82);
      transform:
        translate(-50%, -50%)
        rotate(var(--angle, 0deg))
        translateY(-11px);
    }

    .gradient-angle-input {
      width: 58px;
      min-width: 58px;
      box-sizing: border-box;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      padding: 8px 10px;
      font: 800 13px/1 var(--font-family);
    }

    .gradient-opacity-control {
      display: flex;
      gap: 8px;
      align-items: center;
      width: 100%;
      min-width: 0;
    }

    .gradient-opacity-track {
      position: relative;
      flex: 1 1 auto;
      width: 100%;
      min-width: 120px;
      height: 12px;
      border: 0;
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(139,184,255,0) 0%, var(--opacity-color, #8bb8ff) 100%),
        conic-gradient(#d8dce6 25%, #ffffff 0 50%, #d8dce6 0 75%, #ffffff 0) 0 / 12px 12px;
      cursor: pointer;
    }

    .gradient-opacity-handle {
      position: absolute;
      top: 50%;
      width: 10px;
      height: 22px;
      border: 2px solid #ffffff;
      border-radius: 5px;
      background: #0e1020;
      box-shadow: 0 0 0 2px rgba(5,5,10,0.78);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .gradient-opacity-input {
      width: 58px;
      min-width: 58px;
      box-sizing: border-box;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      padding: 8px 10px;
      font: 800 13px/1 var(--font-family);
    }

    .gradient-color-fields {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 9px;
    }

    .gradient-color-fields label:first-child {
      grid-column: 1 / -1;
    }

    .gradient-hex-combo {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .gradient-hex-combo input[type="color"] {
      width: 44px;
      min-width: 44px;
      height: 32px;
      padding: 2px;
      cursor: pointer;
    }

    .gradient-color-fields label {
      display: grid;
      gap: 4px;
      color: rgba(255,255,255,0.58);
      font: 900 10px/1 var(--font-family);
      text-transform: uppercase;
    }

    .gradient-color-fields input {
      min-width: 0;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      padding: 7px 8px;
      font: 800 13px/1 var(--font-family);
    }

    .gradient-color-fields .gradient-hex-combo input[type="color"] {
      width: 44px;
      min-width: 44px;
      padding: 2px;
    }

    .gradient-tool-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      margin: 10px 0;
      font: 700 13px/1.2 var(--font-family);
    }

    .gradient-hue::-moz-range-thumb {
      width: 10px;
      height: 22px;
      border: 2px solid #ffffff;
      border-radius: 5px;
      background: #0e1020;
      box-shadow: 0 0 0 2px rgba(5,5,10,0.78);
    }

    .gradient-stop-row {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) 64px 26px;
      gap: 8px;
      align-items: center;
      padding: 4px;
      border-radius: 8px;
    }

    .gradient-stop-row.active {
      background: rgba(255,255,255,0.12);
    }

    .gradient-stop-row input[type="color"] {
      width: 44px;
      min-width: 44px;
      height: 32px;
      padding: 2px;
    }

    .gradient-stop-row input[type="text"],
    .gradient-stop-row input[type="number"] {
      min-width: 0;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      padding: 7px 8px;
      font: 700 13px/1 var(--font-family);
    }

    .gradient-remove {
      width: 26px;
      height: 26px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: rgba(255,255,255,0.56);
      cursor: pointer;
      font: 900 18px/1 var(--font-family);
    }

    .gradient-remove:disabled {
      opacity: 0.22;
      cursor: default;
    }

    .config-reset {
      min-width: 0;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 7px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.76);
      padding: 6px 8px;
      cursor: pointer;
      font: 900 11px/1 var(--font-family);
    }

    .config-reset:hover {
      background: rgba(255,255,255,0.13);
      color: #ffffff;
    }

    .config-group {
      margin: 9px 0;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      background: rgba(255,255,255,0.035);
      overflow: hidden;
    }

    .config-group summary {
      list-style: none;
      cursor: pointer;
    }

    .config-group summary::-webkit-details-marker {
      display: none;
    }

    .config-group .config-control {
      margin: 0;
      padding: 9px 10px;
    }

    .config-group-summary span::before {
      content: ">";
      display: inline-block;
      width: 14px;
      color: rgba(255,255,255,0.62);
      transition: transform 0.16s ease;
    }

    .config-group[open] .config-group-summary span::before {
      transform: rotate(90deg);
    }

    .config-group-controls {
      padding: 2px 10px 9px 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .config-group-controls .config-control {
      padding: 6px 0;
    }

    .config-group-description {
      margin: 2px 0 8px;
      color: rgba(255,255,255,0.48);
      font: 700 11px/1.35 var(--font-family);
    }

    .range-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .range-value {
      min-width: 36px;
      color: rgba(255,255,255,0.74);
      text-align: right;
      font-size: 12px;
    }

    .config-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .config-actions button,
    .autoscroll-resume {
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 8px;
      background: rgba(10,10,18,0.78);
      color: #ffffff;
      font: 800 13px/1 sans-serif;
      cursor: pointer;
    }

    .config-actions button:hover,
    .autoscroll-resume:hover {
      background: rgba(145,70,255,0.84);
    }

    .url-output {
      width: 100%;
      max-width: none;
      margin-top: 10px;
      box-sizing: border-box;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.82);
      padding: 8px;
      font: 700 12px/1.25 Consolas, monospace;
    }

    .preview-pane {
      min-width: 0;
      height: 100vh;
      overflow: auto;
      padding: 36px 24px 24px 56px;
      box-sizing: border-box;
      background: var(--test-area-bg, transparent);
      background-position: var(--test-area-bg-position, 0 0);
      background-size: var(--test-area-bg-size, auto);
    }

    .preview-pane.preview-surface-checker {
      --test-area-bg:
        linear-gradient(45deg, rgba(255,255,255,0.14) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.14) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.14) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.14) 75%),
        #15151d;
      --test-area-bg-position: 0 0, 0 8px, 8px -8px, -8px 0;
      --test-area-bg-size: 16px 16px;
    }

    .autoscroll-quick-controls {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 70;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      background: rgba(8,8,16,0.88);
      box-shadow:
        0 0 18px rgba(145,70,255,0.22),
        0 10px 24px rgba(0,0,0,0.30);
      backdrop-filter: blur(12px);
    }

    .autoscroll-quick-controls .config-control {
      display: flex;
      grid-template-columns: none;
      gap: 6px;
      margin: 0;
      white-space: nowrap;
      font-size: 11px;
    }

    .autoscroll-quick-controls .config-control input[type="checkbox"] {
      width: 15px;
      min-width: 15px;
      height: 15px;
    }

    .autoscroll-quick-controls .config-control input[type="number"] {
      width: 78px;
      min-width: 78px;
      padding: 5px 6px;
      font-size: 11px;
    }

    .autoscroll-quick-controls button,
    .surface-picker button {
      padding: 5px 7px;
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 7px;
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      font: 800 11px/1 var(--font-family);
      cursor: pointer;
    }

    .autoscroll-quick-controls button:hover,
    .surface-picker button:hover {
      background: rgba(145,70,255,0.72);
    }

    .surface-picker {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .surface-picker button.active {
      background: rgba(145,70,255,0.70);
      color: #ffffff;
    }

    .surface-picker input[type="color"] {
      width: 31px;
      min-width: 31px;
      height: 29px;
      padding: 2px;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 7px;
      background: rgba(255,255,255,0.08);
      cursor: pointer;
    }

    #chat {
      position: relative;
      left: auto;
      bottom: auto;
      width: var(--chat-width);
      max-width: 100%;
      margin: 0 auto;
      padding-bottom: 24px;
    }

    .autoscroll-resume {
      position: fixed;
      left: 50%;
      bottom: 12px;
      z-index: 60;
      display: none;
      background: rgba(145,70,255,0.92);
      transform: translateX(-50%);
      box-shadow:
        0 0 18px rgba(145,70,255,0.42),
        0 10px 24px rgba(0,0,0,0.38);
    }

    .autoscroll-resume.visible {
      display: block;
    }

    .connection-toast {
      left: auto;
      right: 12px;
      bottom: calc(12px + (var(--toast-index, 0) * 44px));
      width: auto;
      max-width: min(300px, calc(100vw - 24px));
      padding: 7px 9px;
      border-width: 1px;
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.2;
      box-shadow:
        0 0 12px color-mix(in srgb, var(--toast-color) 42%, transparent),
        0 8px 18px rgba(0,0,0,0.34);
    }

    .type-style-button-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .type-style-edit-button {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      background: rgba(255,255,255,0.055);
      color: #ffffff;
      text-align: left;
      font: 800 13px/1.2 var(--font-family);
      cursor: pointer;
    }

    .type-style-edit-button::after {
      content: "Edit";
      color: rgba(255,255,255,0.66);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .type-style-edit-button:hover {
      border-color: rgba(145,70,255,0.72);
      background: rgba(145,70,255,0.18);
    }

    .type-style-modal {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(4,4,10,0.70);
      backdrop-filter: blur(10px);
    }

    .type-style-modal[hidden] {
      display: none;
    }

    .type-style-modal-panel {
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      width: min(920px, 100%);
      max-height: min(860px, calc(100vh - 44px));
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      background: rgba(10,10,18,0.98);
      box-shadow:
        0 0 30px rgba(145,70,255,0.30),
        0 24px 60px rgba(0,0,0,0.56);
      overflow: hidden;
    }

    .type-style-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }

    .type-style-modal-header h2 {
      margin: 0;
      font: 900 16px/1.15 var(--font-family);
    }

    .type-style-modal-close {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      font: 900 20px/1 var(--font-family);
      cursor: pointer;
    }

    .type-style-modal-preview {
      padding: 28px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      background: var(--type-preview-bg, transparent);
      background-position: var(--type-preview-bg-position, 0 0);
      background-size: var(--type-preview-bg-size, auto);
      overflow: hidden;
    }

    .type-style-modal-preview.preview-surface-checker {
      --type-preview-bg:
        linear-gradient(45deg, rgba(255,255,255,0.14) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.14) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.14) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.14) 75%),
        #15151d;
      --type-preview-bg-position: 0 0, 0 8px, 8px -8px, -8px 0;
      --type-preview-bg-size: 16px 16px;
    }

    .type-preview-tools {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }

    .type-preview-tools .surface-picker {
      margin-left: auto;
    }

    .type-preview-bg-button {
      padding: 6px 9px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 7px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.74);
      font: 800 11px/1 var(--font-family);
      cursor: pointer;
    }

    .type-preview-bg-button.active {
      background: rgba(145,70,255,0.70);
      color: #ffffff;
    }

    .type-style-modal-preview .msg {
      margin: 0;
      transform: none;
    }

    .type-style-modal-preview .preview-avatar {
      background: #65cde0;
    }

    .type-style-modal-controls {
      min-height: 0;
      overflow: auto;
      padding: 12px 16px 16px;
    }

    @media (max-width: 820px) {
      .config-page {
        grid-template-columns: 1fr;
      }

      .config-panel {
        position: relative;
        height: auto;
      }

      #chat {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="config-page">
    <aside class="config-panel">
      <h1 class="config-title">Chat Config</h1>
      <div id="configControls"></div>
      <div class="config-section">
        <h2>URL</h2>
        <input id="urlOutput" class="url-output" type="text" readonly>
      </div>
    </aside>

    <section class="preview-pane" data-autoscroll-container>
      <div id="chat"></div>
    </section>

    <div id="autoscrollQuickControls" class="autoscroll-quick-controls" aria-label="Auto scroll controls"></div>
    <div id="typeStyleModal" class="type-style-modal" hidden>
      <div class="type-style-modal-panel" role="dialog" aria-modal="true" aria-labelledby="typeStyleModalTitle">
        <header class="type-style-modal-header">
          <h2 id="typeStyleModalTitle">Style Editor</h2>
          <button id="typeStyleModalClose" class="type-style-modal-close" type="button" aria-label="Close style editor">&times;</button>
        </header>
        <div id="typeStyleModalPreview" class="type-style-modal-preview"></div>
        <div class="type-preview-tools" aria-label="Preview background">
          <div class="surface-picker" data-surface-picker="type-preview">
            <button class="type-preview-bg-button active" type="button" data-surface-mode="checker">Checker</button>
            <button class="type-preview-bg-button" type="button" data-surface-mode="color">Colour</button>
            <input type="color" value="#080810" data-surface-color aria-label="Preview background colour">
          </div>
        </div>
        <div id="typeStyleModalControls" class="type-style-modal-controls"></div>
      </div>
    </div>
  </main>

  <script src="config.js"></script>
  <script>
    window.CHAT_CONFIG.layout.maxMessages = 200;
    window.CHAT_CONFIG.scrollTest = {
      enabled: true,
      intervalMs: 1300,
      autoScroll: true,
      ...(window.CHAT_CONFIG.scrollTest || {})
    };
  </script>
  <script src="script.js"></script>

      return {
        title,
        description,

      gradientControls("Alert Border", "alertBorder"),
      gradientControls("Alert Background Gradient", "alertBg")

      gradientControls("Gift Glow", "giftGlow"),
      gradientControls("Gift Border", "giftBorder"),
      gradientControls("Gift Background Gradient", "giftBg")

    function getTypeStyleControls(group, type) {
      if (group === "tiktok" && type === "gifts") {
        return [
          ...avatarTypeControls,
          ...giftTypeControls
        ];
      }

      if (type === "chat" || (group === "special" && type === "rainbow")) {
        return [
          ...avatarTypeControls,
          ...titleTypeControls,
          ...messageTypeControls
        ];
      }

      return [
        ...avatarTypeControls,
        ...alertTypeControls
      ];
    }

    function mapTypeStyleControl(control, group, type) {
      if (Array.isArray(control)) {
        const [controlLabel, key, inputType, options] = control;
        return [
          controlLabel,
          `style.typeStyles.${group}.${type}.${key}`,
          inputType,
          options
        ];
      }

      if (control.kind === "gradient") {
        return {
          ...control,
          pathPrefix: `style.typeStyles.${group}.${type}.${control.prefix}`
        };
      }

      return {
        ...control,
        controls: control.controls.map(child => mapTypeStyleControl(child, group, type))
      };
    }

    function createTypeStyleSections() {
      return typeStyleGroups.map(source => ({
        title: source.title,
        description: source.description,

    function toUrlPascalPart(value) {
      return String(value || "").replace(/^[a-z]/, char => char.toUpperCase());
    }

    function getFriendlyTypeStyleParam(path) {
      const match = String(path || "").match(/^style\.typeStyles\.([^.]+)\.([^.]+)\.([^.]+)$/);
      if (!match) return "";

      const [, group, type, field] = match;
      const friendlyField = field.endsWith("Enabled")
        ? field.slice(0, -"Enabled".length)
        : field;

      return `${group}${toUrlPascalPart(type)}${toUrlPascalPart(friendlyField)}`;
    }

    function getUrlParamName(path) {
      return aliasByPath[path] || getFriendlyTypeStyleParam(path) || path;
    }
